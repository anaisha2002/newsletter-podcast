name: Daily Newsletter Podcast

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:         # manual trigger for testing

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to commit feed.xml back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip show groq
          pip list

      - name: Write credentials.json
        run: echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      - name: Write token.json
        run: echo '${{ secrets.GMAIL_TOKEN }}' > token.json

      - name: Create output directory
        run: mkdir -p output

      - name: Run newsletter pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/newsletter-podcast
        run: python main.py

      - name: Commit updated feed.xml to repo
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@newsletter-podcast"
          git add feed.xml
          git diff --staged --quiet || git commit -m "update feed.xml [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
